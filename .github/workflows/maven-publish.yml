# This workflow will build packages with Maven and publish them when a release is published
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  release:
    types: [published]

jobs:
  publish-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B clean package -DskipUTs --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      if: ${{ github.repository_owner == 'dtprj' }}
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml -Dmaven.test.skip=true
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Detect main asset name
      id: main_asset
      shell: bash
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        DONGTING_VERSION=${RELEASE_TAG#v}
        if [ -z "$DONGTING_VERSION" ]; then
          echo "Failed to detect DONGTING_VERSION" >&2
          exit 1
        fi
        echo "zip_name=dongting-dist-${DONGTING_VERSION}.zip" >> "$GITHUB_OUTPUT"
        echo "tar_name=dongting-dist-${DONGTING_VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

    - name: Repackage assets with versioned directory name
      shell: bash
      run: |
        cd target
        BASE_NAME="${{ steps.main_asset.outputs.tar_name }}"
        BASE_NAME="${BASE_NAME%.tar.gz}"
        cp -R dongting-dist "${BASE_NAME}"
        zip -rq "${{ steps.main_asset.outputs.zip_name }}" "${BASE_NAME}"
        tar czf "${BASE_NAME}.tar.gz" "${BASE_NAME}"
        rm -rf "${BASE_NAME}"

    - name: Upload Release Asset (zip)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./target/${{ steps.main_asset.outputs.zip_name }}
        asset_name: ${{ steps.main_asset.outputs.zip_name }}
        asset_content_type: application/zip

    - name: Upload Release Asset (tar.gz)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./target/${{ steps.main_asset.outputs.tar_name }}
        asset_name: ${{ steps.main_asset.outputs.tar_name }}
        asset_content_type: application/gzip

  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-latest
          java_version: '17'
          build_variant: standard
          asset_suffix: linux
          extra_profiles: ''
          packaging: tar.gz
        - runner: windows-latest
          java_version: '17'
          build_variant: standard
          asset_suffix: windows
          extra_profiles: ''
          packaging: zip
        - runner: macos-15
          java_version: '17'
          build_variant: standard
          asset_suffix: macos-arm
          extra_profiles: ''
          packaging: tar.gz
        - runner: ubuntu-latest
          java_version: '11'
          build_variant: minimal
          asset_suffix: linux
          extra_profiles: ',minimalDist'
          packaging: tar.gz
        - runner: windows-latest
          java_version: '11'
          build_variant: minimal
          asset_suffix: windows
          extra_profiles: ',minimalDist'
          packaging: zip
        - runner: macos-15
          java_version: '11'
          build_variant: minimal
          asset_suffix: macos-arm
          extra_profiles: ',minimalDist'
          packaging: tar.gz

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      if: ${{ matrix.build_variant == 'standard' }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java_version }}
        distribution: 'temurin'
        cache: maven

    - name: Set up JDK 17 for minimal dependencies
      if: ${{ matrix.build_variant == 'minimal' }}
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install dependencies for minimal build
      if: ${{ matrix.build_variant == 'minimal' }}
      shell: bash
      run: mvn -B install -pl test-support,client-ex,client,server -am -Dmaven.test.skip=true -Dmaven.install.skip=false --file pom.xml

    - name: Set up JDK 11 for minimal asset build
      if: ${{ matrix.build_variant == 'minimal' }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java_version }}
        distribution: 'temurin'

    - name: Detect asset name
      id: metadata
      shell: bash
      env:
        ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        BUILD_VARIANT: ${{ matrix.build_variant }}
        PACKAGING: ${{ matrix.packaging }}
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        DONGTING_VERSION=${RELEASE_TAG#v}
        if [ -z "$DONGTING_VERSION" ]; then
          echo "Failed to detect DONGTING_VERSION" >&2
          exit 1
        fi
        JAVA_SETTINGS=$(java -XshowSettings:properties -version 2>&1 || true)
        JAVA_VERSION=$(printf '%s\n' "$JAVA_SETTINGS" | awk -F'= ' '/^[[:space:]]*java.version = / {print $2; exit}')
        if [ -z "$JAVA_VERSION" ]; then
          JAVA_VERSION=$(java -version 2>&1 | awk -F '"' '/version/ {print $2; exit}')
        fi
        if [ -z "$JAVA_VERSION" ]; then
          echo "Failed to detect JAVA_VERSION" >&2
          exit 1
        fi
        echo "java_version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"
        if [ "$BUILD_VARIANT" = "minimal" ]; then
          BASE_NAME="dongting-dist-${DONGTING_VERSION}-minimal-${ASSET_SUFFIX}-jre${JAVA_VERSION}"
        else
          BASE_NAME="dongting-dist-${DONGTING_VERSION}-${ASSET_SUFFIX}-jre${JAVA_VERSION}"
        fi
        echo "base_name=$BASE_NAME" >> "$GITHUB_OUTPUT"
        echo "asset_name=$BASE_NAME.${PACKAGING}" >> "$GITHUB_OUTPUT"

    - name: Build release asset
      shell: bash
      run: |
        if [ "${{ matrix.build_variant }}" = "minimal" ]; then
          mvn -B -f dist/pom.xml clean package -Dmaven.test.skip=true -PaddJRE${{ matrix.extra_profiles }} -Ddist.basename=${{ steps.metadata.outputs.base_name }}
        else
          mvn -B clean package -pl dist -am -DskipUTs -PaddJRE -Ddist.basename=${{ steps.metadata.outputs.base_name }} --file pom.xml
        fi

    - name: Create tar.gz package
      if: ${{ matrix.packaging == 'tar.gz' }}
      shell: bash
      run: |
        BASE_NAME="${{ steps.metadata.outputs.base_name }}"
        cd target
        cp -R dongting-dist "${BASE_NAME}"
        tar czf "${BASE_NAME}.tar.gz" "${BASE_NAME}"
        rm -rf "${BASE_NAME}"

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./target/${{ steps.metadata.outputs.asset_name }}
        asset_name: ${{ steps.metadata.outputs.asset_name }}
        asset_content_type: ${{ matrix.packaging == 'tar.gz' && 'application/gzip' || 'application/zip' }}
