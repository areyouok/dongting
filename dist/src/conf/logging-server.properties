handlers = com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler, com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler, java.util.logging.ConsoleHandler

.level = INFO

com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.level = INFO
com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.pattern = ${LOG_DIR}/dongting-server.%g.log
com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.limit = 104857600
com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.count = 10
com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.append = true
com.github.dtprj.dongting.dist.DistLogConfig$MainFileHandler.formatter = com.github.dtprj.dongting.dist.DistLogConfig$MainFormatter

com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.level = INFO
com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.pattern = ${LOG_DIR}/dongting-stats.%g.log
com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.limit = 104857600
com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.count = 2
com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.append = true
com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler.formatter = com.github.dtprj.dongting.dist.DistLogConfig$StatsFormatter

java.util.logging.ConsoleHandler.level = ${CONSOLE_LOG_LEVEL:-OFF}
java.util.logging.ConsoleHandler.formatter = com.github.dtprj.dongting.dist.DistLogConfig$MainFormatter

com.github.dtprj.dongting.perf.level = INFO
com.github.dtprj.dongting.perf.handlers = com.github.dtprj.dongting.dist.DistLogConfig$StatsFileHandler
com.github.dtprj.dongting.perf.useParentHandlers = false
